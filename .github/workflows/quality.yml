name: quality-gate

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test:
    name: "${{ matrix.os }} / py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --all-groups --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check src

      - name: Test with coverage
        run: uv run pytest tests/ --cov=src --cov-branch --cov-report=term-missing:skip-covered --cov-report=xml --cov-fail-under=92

      - name: Branch coverage gate
        run: uv run python scripts/check_branch_coverage.py --min-branch 85 --xml coverage.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
